name: magic_notifications
description: Multi-channel notification system for Magic Framework. Supports database (in-app), push (OneSignal), and mail channels.
version: 0.0.1-alpha.1
homepage: https://magic.fluttersdk.com/notifications
documentation: https://magic.fluttersdk.com/packages/notifications/getting-started/installation
repository: https://github.com/fluttersdk/magic_notifications
issue_tracker: https://github.com/fluttersdk/magic_notifications/issues

topics:
  - notifications
  - push-notifications
  - onesignal
  - magic-framework
  - flutter-plugin

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  magic: ^1.0.0-alpha.3
  magic_cli: ^0.0.1-alpha.3
  onesignal_flutter: ^5.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^6.0.0

executables:
  magic_notifications: magic_notifications
