name: Bug Report
description: Report a bug in Magic Notifications Plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Register `NotificationsServiceProvider` in config
        2. Dispatch a notification via `NotificationManager`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the plugin is affected?
      options:
        - NotificationManager (Singleton, dispatch)
        - Channels (DatabaseChannel, PushChannel)
        - Drivers (OneSignal mobile/web)
        - Service Provider (Registration, Boot)
        - CLI (Install, Configure, Doctor, Test, Channels, Uninstall)
        - Models (DatabaseNotification, PushMessage, Preferences)
        - Polling (NotificationPoller)
        - Widgets (PushPromptDialog)
        - Other
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction Code
      description: A minimal code snippet to reproduce the issue.
      render: dart

  - type: input
    id: plugin-version
    attributes:
      label: Magic Notifications Version
      placeholder: "0.0.1"
    validations:
      required: true

  - type: input
    id: magic-version
    attributes:
      label: Magic Framework Version
      placeholder: "1.0.0-alpha.3"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      placeholder: "3.27.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
        - All
    validations:
      required: true
